<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Layout 3 - GitHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { width: 1280px; background: #0d1117; }
 
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 64px;
      background: #161b22; border-bottom: 1px solid #30363d;
    }
    .header-left { display: flex; align-items: center; gap: 28px; }
    .logo-icon {
      width: 34px; height: 34px; background: #fff;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 20px;
    }
    .nav-links { display: flex; gap: 24px; }
    .nav-item {
      display: flex; align-items: center; gap: 4px;
      font-size: 14px; color: #cdd9e5; cursor: pointer; font-weight: 500;
    }
    .nav-item span { font-size: 11px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; padding: 6px 12px; color: #8b949e;
      font-size: 13px; width: 240px; cursor: text;
    }
    .btn-link { background: none; border: none; color: #cdd9e5; font-size: 14px; cursor: pointer; }
    .btn-outline-white {
      padding: 8px 16px; background: transparent;
      border: 1px solid #cdd9e5; border-radius: 6px;
      color: #cdd9e5; font-size: 14px; cursor: pointer;
    }
 
    main {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; min-height: calc(100vh - 64px);
      padding: 80px 40px; gap: 36px;
      background-image: url('https://images.unsplash.com/photo-1629654297299-c8506221ca97?w=1400');
      background-size: cover; background-position: center; position: relative;
    }
    main::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(13,17,23,0.82);
    }
    main > * { position: relative; z-index: 1; }
 
    .hero-title {
      font-size: 52px; font-weight: 800; color: #fff;
      text-align: center; line-height: 1.15; max-width: 900px;
    }
    .hero-subtitle {
      font-size: 18px; color: #8b949e; text-align: center;
      line-height: 1.6; max-width: 560px;
    }
    .hero-actions { display: flex; gap: 16px; align-items: center; }
    .input-email {
      width: 280px; height: 48px;
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 6px; padding: 0 16px;
      color: #cdd9e5; font-size: 14px; outline: none;
    }
    .input-email::placeholder { color: #8b949e; }
    .btn-green {
      padding: 0 24px; height: 48px;
      background: #238636; border: 1px solid #2ea043;
      border-radius: 6px; color: #fff; font-size: 14px;
      font-weight: 600; cursor: pointer;
    }
    .btn-dark-outline {
      padding: 0 24px; height: 48px;
      background: #21262d; border: 1px solid #30363d;
      border-radius: 6px; color: #cdd9e5; font-size: 14px;
      font-weight: 500; cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="logo-icon">⚙</div>
      <nav class="nav-links">
        <div class="nav-item">Plataforma <span>▾</span></div>
        <div class="nav-item">Soluções <span>▾</span></div>
        <div class="nav-item">Recursos <span>▾</span></div>
        <div class="nav-item">Código aberto <span>▾</span></div>
        <div class="nav-item">Enterprise <span>▾</span></div>
        <div class="nav-item">Preços</div>
      </nav>
    </div>
    <div class="header-right">
      <div class="search-box">🔍 Buscar</div>
      <button class="btn-link">Entrar</button>
      <button class="btn-outline-white">Criar uma conta</button>
    </div>
  </header>
  <main>
    <h1 class="hero-title">O futuro do desenvolvimento de software acontece em conjunto</h1>
    <p class="hero-subtitle">As ferramentas e as tendências evoluem, mas a colaboração permanece. Com o GitHub, desenvolvedores, agentes e código se unem em uma única plataforma.</p>
    <div class="hero-actions">
      <input class="input-email" type="email" placeholder="Digite seu e-mail">
      <button class="btn-green">Cadastrar-se no GitHub</button>
      <button class="btn-dark-outline">Experimente o GitHub Copilot Free</button>
    </div>
  </main>
</body>
</html>
